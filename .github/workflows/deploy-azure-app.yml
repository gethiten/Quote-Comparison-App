name: Deploy App to Azure

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'func_app/**'
      - '.github/workflows/deploy-azure-app.yml'
  workflow_dispatch:
    inputs:
      deploy_function:
        description: Deploy Azure Function App
        required: true
        type: boolean
        default: true
      deploy_backend:
        description: Deploy FastAPI backend Web App
        required: true
        type: boolean
        default: true
      deploy_frontend:
        description: Deploy frontend static site
        required: true
        type: boolean
        default: true

permissions:
  id-token: write
  contents: read

jobs:
  build_frontend:
    name: Build frontend artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ vars.FRONTEND_API_BASE_URL != '' && vars.FRONTEND_API_BASE_URL || (vars.AZURE_WEBAPP_NAME != '' && format('https://{0}.azurewebsites.net/api', vars.AZURE_WEBAPP_NAME)) || '/api' }}
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  deploy_function:
    name: Deploy Function App
    runs-on: ubuntu-latest
    needs: build_frontend
    if: ${{ vars.AZURE_FUNCTIONAPP_NAME != '' && (github.event_name != 'workflow_dispatch' || github.event.inputs.deploy_function == 'true') }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Azure Function App
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ vars.AZURE_FUNCTIONAPP_NAME }}
          package: ./func_app
          scm-do-build-during-deployment: true
          enable-oryx-build: true
          respect-funcignore: true

  deploy_backend:
    name: Deploy Backend Container
    runs-on: ubuntu-latest
    needs: build_frontend
    if: ${{ vars.AZURE_WEBAPP_NAME != '' && vars.AZURE_CONTAINER_REGISTRY != '' && (github.event_name != 'workflow_dispatch' || github.event.inputs.deploy_backend == 'true') }}
    env:
      AZURE_RG: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME }}
      ACR_NAME: ${{ vars.AZURE_CONTAINER_REGISTRY }}
      IMAGE_NAME: ${{ vars.AZURE_BACKEND_IMAGE_NAME != '' && vars.AZURE_BACKEND_IMAGE_NAME || 'quotecompare-api' }}
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push backend image to ACR
        uses: azure/cli@v2
        with:
          inlineScript: |
            az acr build \
              --registry "$ACR_NAME" \
              --image "${IMAGE_NAME}:${IMAGE_TAG}" \
              --image "${IMAGE_NAME}:latest" \
              ./backend

      - name: Configure Web App to use ACR image
        uses: azure/cli@v2
        with:
          inlineScript: |
            LOGIN_SERVER=$(az acr show --name "$ACR_NAME" --query loginServer -o tsv)
            ACR_USERNAME=$(az acr credential show --name "$ACR_NAME" --query username -o tsv)
            ACR_PASSWORD=$(az acr credential show --name "$ACR_NAME" --query 'passwords[0].value' -o tsv)

            az webapp config appsettings set \
              --resource-group "$AZURE_RG" \
              --name "$AZURE_WEBAPP_NAME" \
              --settings WEBSITES_PORT=8000 WEBSITES_ENABLE_APP_SERVICE_STORAGE=false > /dev/null

            az webapp config set \
              --resource-group "$AZURE_RG" \
              --name "$AZURE_WEBAPP_NAME" \
              --startup-file "uvicorn app.main:app --host 0.0.0.0 --port 8000" > /dev/null

            az webapp config container set \
              --resource-group "$AZURE_RG" \
              --name "$AZURE_WEBAPP_NAME" \
              --container-image-name "${LOGIN_SERVER}/${IMAGE_NAME}:${IMAGE_TAG}" \
              --container-registry-url "https://${LOGIN_SERVER}" \
              --container-registry-user "$ACR_USERNAME" \
              --container-registry-password "$ACR_PASSWORD"

            az webapp restart --resource-group "$AZURE_RG" --name "$AZURE_WEBAPP_NAME"

            echo "LOGIN_SERVER=$LOGIN_SERVER" >> "$GITHUB_ENV"

      - name: Verify backend health endpoint
        shell: bash
        run: |
          API_URL="https://${AZURE_WEBAPP_NAME}.azurewebsites.net/api/health"
          echo "Checking ${API_URL}"

          for attempt in {1..15}; do
            status=$(curl -s -o response.json -w "%{http_code}" "$API_URL" || true)
            if [ "$status" = "200" ]; then
              echo "Backend is healthy"
              cat response.json
              echo "### Backend deployment complete" >> "$GITHUB_STEP_SUMMARY"
              echo "- Backend URL: https://${AZURE_WEBAPP_NAME}.azurewebsites.net" >> "$GITHUB_STEP_SUMMARY"
              echo "- Health endpoint: ${API_URL}" >> "$GITHUB_STEP_SUMMARY"
              echo "- Container image: ${LOGIN_SERVER}/${IMAGE_NAME}:${IMAGE_TAG}" >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi

            echo "Attempt ${attempt}/15 returned ${status}; retrying in 15 seconds"
            sleep 15
          done

          echo "Backend health check failed"
          cat response.json || true
          exit 1

  deploy_frontend:
    name: Deploy Frontend Static Site
    runs-on: ubuntu-latest
    needs: build_frontend
    if: ${{ vars.AZURE_STORAGE_ACCOUNT != '' && (github.event_name != 'workflow_dispatch' || github.event.inputs.deploy_frontend == 'true') }}

    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Publish frontend to Azure Storage static website
        uses: azure/cli@v2
        with:
          inlineScript: |
            az storage blob service-properties update \
              --account-name "${{ vars.AZURE_STORAGE_ACCOUNT }}" \
              --static-website \
              --index-document index.html \
              --404-document index.html \
              --auth-mode login

            az storage blob upload-batch \
              --account-name "${{ vars.AZURE_STORAGE_ACCOUNT }}" \
              --auth-mode login \
              --destination '$web' \
              --source frontend-dist \
              --overwrite

            FRONTEND_URL=$(az storage account show \
              --name "${{ vars.AZURE_STORAGE_ACCOUNT }}" \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --query primaryEndpoints.web -o tsv)

            echo "### Frontend deployment complete" >> "$GITHUB_STEP_SUMMARY"
            echo "- Frontend URL: ${FRONTEND_URL}" >> "$GITHUB_STEP_SUMMARY"
            echo "- API base URL used: ${{ vars.FRONTEND_API_BASE_URL != '' && vars.FRONTEND_API_BASE_URL || format('https://{0}.azurewebsites.net/api', vars.AZURE_WEBAPP_NAME) }}" >> "$GITHUB_STEP_SUMMARY"
