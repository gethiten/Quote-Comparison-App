services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: quoteapp
      POSTGRES_PASSWORD: quoteapp_dev
      POSTGRES_DB: quote_comparison
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quoteapp -d quote_comparison"]
      interval: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://quoteapp:quoteapp_dev@db:5432/quote_comparison

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
